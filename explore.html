<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aetheria | Discovery</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --bg: #050505; --card-bg: rgba(255, 255, 255, 0.03); }
        body { background: var(--bg); color: #fff; margin: 0; font-family: 'Inter', sans-serif; }

        /* Header */
        header { padding: 40px 20px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .brand { font-family: 'Playfair Display', serif; font-size: 2.5rem; color: var(--gold); letter-spacing: 4px; }

        /* Feed */
        .feed { max-width: 450px; margin: 0 auto; padding: 20px; }
        
        .card { 
            background: var(--card-bg); 
            backdrop-filter: blur(10px); 
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 20px; 
            margin-bottom: 60px; 
            overflow: hidden; 
            transition: 0.4s;
        }
        .card:hover { border-color: var(--gold); }
        .card img { width: 100%; height: 400px; object-fit: cover; }

        .content { padding: 25px; }
        .name { font-family: 'Playfair Display', serif; font-size: 1.8rem; margin: 0; }
        .meta { color: var(--gold); font-size: 0.75rem; letter-spacing: 2px; text-transform: uppercase; margin: 10px 0; }
        .bio { color: #aaa; font-size: 0.95rem; line-height: 1.6; margin-bottom: 25px; }

        .cta { 
            display: block; width: 100%; padding: 16px; 
            background: transparent; border: 1px solid #fff; 
            color: #fff; border-radius: 10px; cursor: pointer;
            transition: 0.3s; font-weight: 600; text-align: center; text-decoration: none;
        }
        .cta:hover { background: #fff; color: #000; }

        footer { text-align: center; padding: 40px; color: #444; font-size: 0.8rem; }
    </style>
</head>
<body>

    <header>
        <div class="brand">AETHERIA</div>
    </header>

    <div class="feed" id="feed-container">
        </div>

    <footer>&copy; 2026 Aetheria Inc. All Rights Reserved.</footer>

    <script src="js/data.js"></script>
    <script>
        const feed = document.getElementById('feed-container');
        profiles.forEach(user => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <img src="${user.img}" alt="${user.name}">
                <div class="content">
                    <h2 class="name">${user.name}, ${user.age}</h2>
                    <p class="meta">${user.location} • Verified</p>
                    <p class="bio">${user.bio}</p>
                    <a href="pricing.html" class="cta">Request Access</a>
                </div>
            `;
            feed.appendChild(card);
        });
    </script>
</body>
</html>
