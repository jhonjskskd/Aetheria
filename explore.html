<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aetheria | The Private Gallery</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;400;600&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --gold: #d4af37;
            --black: #050505;
            --dark-grey: #111111;
            --text-main: #ffffff;
            --text-dim: #888888;
            --premium-gradient: linear-gradient(135deg, #d4af37 0%, #fef1b5 50%, #d4af37 100%);
        }

        * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }

        body {
            background-color: var(--black);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            margin: 0;
            overflow-x: hidden;
        }

        /* Personalized Navbar */
        nav {
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #1a1a1a;
            position: sticky;
            top: 0;
            background: rgba(5, 5, 5, 0.9);
            backdrop-filter: blur(10px);
            z-index: 1000;
        }

        .nav-user {
            font-size: 0.65rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--gold);
        }

        /* Header Section */
        header {
            padding: 100px 20px 60px;
            text-align: center;
        }

        .brand {
            font-family: 'Playfair Display', serif;
            font-size: 3.5rem;
            color: var(--gold);
            letter-spacing: 15px;
            text-transform: uppercase;
            margin: 0;
        }

        .subtitle {
            font-size: 0.8rem;
            color: var(--text-dim);
            letter-spacing: 5px;
            text-transform: uppercase;
            margin-top: 15px;
        }

        /* The Profile Feed */
        #feed-container {
            max-width: 600px;
            margin: 0 auto;
            padding: 0 20px 150px;
        }

        .profile-card {
            background: var(--dark-grey);
            border: 1px solid #1a1a1a;
            margin-bottom: 120px;
            transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .img-wrapper {
            width: 100%;
            height: 650px;
            overflow: hidden;
            background: #000;
            position: relative;
        }

        .img-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(100%);
            transition: 1.5s ease;
        }

        .profile-card:hover img {
            filter: grayscale(0%);
            transform: scale(1.08);
        }

        .vip-tag {
            position: absolute;
            top: 20px;
            right: 20px;
            background: var(--gold);
            color: #000;
            font-size: 0.6rem;
            font-weight: 900;
            padding: 5px 15px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .content {
            padding: 60px 40px;
            text-align: center;
        }

        .name {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            margin: 0;
            font-weight: 400;
        }

        .location-label {
            color: var(--gold);
            font-size: 0.7rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin: 15px 0 25px;
        }

        .bio {
            color: var(--text-dim);
            font-size: 1.05rem;
            line-height: 1.9;
            margin-bottom: 40px;
            font-weight: 200;
        }

        .btn-dossier {
            display: block;
            width: 100%;
            padding: 22px;
            background: transparent;
            border: 1px solid var(--text-main);
            color: var(--text-main);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.8rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            transition: 0.4s;
        }

        .btn-dossier:hover {
            background: var(--text-main);
            color: var(--black);
        }

        /* LIVE NOTIFICATIONS (SOCIAL PROOF) */
        #notification-center {
            position: fixed;
            bottom: 30px;
            left: 30px;
            z-index: 9999;
        }

        .toast {
            background: #ffffff;
            color: #000000;
            padding: 18px 25px;
            margin-top: 15px;
            border-radius: 2px;
            font-size: 0.85rem;
            box-shadow: 0 15px 45px rgba(0,0,0,0.8);
            display: flex;
            align-items: center;
            gap: 15px;
            transform: translateX(-120%);
            transition: 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .toast.active { transform: translateX(0); }

        .status-dot {
            height: 10px;
            width: 10px;
            background: #2ecc71;
            border-radius: 50%;
            box-shadow: 0 0 10px #2ecc71;
        }

        footer {
            padding: 100px 20px;
            text-align: center;
            border-top: 1px solid #1a1a1a;
            font-size: 0.6rem;
            letter-spacing: 4px;
            color: #333;
        }
    </style>
</head>
<body>

    <nav>
        <div class="nav-user" id="user-display">Verifying Identity...</div>
        <div class="nav-user">Status: VIP Discovery</div>
    </nav>

    <header>
        <h1 class="brand">Aetheria</h1>
        <div class="subtitle">The Private Collective</div>
    </header>

    <main id="feed-container">
        </main>

    <div id="notification-center"></div>

    <footer>
        EST. 2026 • AETHERIA PRIVATE CLIENT SERVICES
    </footer>

    <script src="js/data.js"></script>
    <script>
        // 1. Capture and Display User Data
        const name = localStorage.getItem('aetheria_name') || "Guest";
        const city = localStorage.getItem('aetheria_city') || "Unknown";
        document.getElementById('user-display').innerText = `Member: ${name} / ${city}`;

        // 2. Load the Luxury Feed
        const container = document.getElementById('feed-container');
        
        profiles.forEach(user => {
            const card = document.createElement('article');
            card.className = 'profile-card';
            card.innerHTML = `
                <div class="img-wrapper">
                    <div class="vip-tag">Verified</div>
                    <img src="${user.img}" alt="Luxury Profile">
                </div>
                <div class="content">
                    <h2 class="name">${user.name}, ${user.age}</h2>
                    <div class="location-label">${user.location} • Dossier Ref: #00${user.id}</div>
                    <p class="bio">${user.bio}</p>
                    <a href="pricing.html" class="btn-dossier">Request Full Access</a>
                </div>
            `;
            container.appendChild(card);
        });

        // 3. Social Proof Engine (The "Notifications")
        const names = ["Tunde", "Zainab", "Olu", "Amara", "Chidi", "Sade", "Musa", "Efe"];
        const cities = ["Lagos", "Abuja", "Port Harcourt", "London", "Dubai", "Ibadan"];
        const actions = ["unlocked Gold Access", "joined the Collective", "verified their status", "requested a connection"];

        function createNotification() {
            const center = document.getElementById('notification-center');
            
            // Randomize Data
            const rName = names[Math.floor(Math.random() * names.length)];
            const rCity = cities[Math.floor(Math.random() * cities.length)];
            const rAction = actions[Math.floor(Math.random() * actions.length)];

            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerHTML = `
                <div class="status-dot"></div>
                <div><strong>${rName}</strong> from ${rCity} ${rAction}.</div>
            `;

            center.appendChild(toast);

            // Animate In
            setTimeout(() => toast.classList.add('active'), 100);

            // Animate Out and Remove
            setTimeout(() => {
                toast.classList.remove('active');
                setTimeout(() => toast.remove(), 1000);
            }, 6000);
        }

        // Drop a notification every 15 seconds
        setInterval(createNotification, 15000);
        
        // First notification after 4 seconds
        setTimeout(createNotification, 4000);

    </script>
</body>
</html>
