<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aetheria | Private Access</title>
    
    <link rel="stylesheet" href="css/styles.css">
    
    <style>
        /* Specific layout for the application page to keep it centered */
        .gatekeeper-container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .form-box {
            max-width: 500px;
            width: 100%;
            background: var(--card-bg);
            border: 1px solid var(--border-dark);
            padding: 60px 40px;
            text-align: center;
            animation: fadeIn 1s ease-in-out;
        }

        .form-box:hover {
            border-color: var(--border-light);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Subtle disclaimer */
        .disclaimer {
            font-size: 0.65rem;
            color: var(--text-muted);
            margin-top: 30px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <nav>
        <div class="status-badge">System: Secure Encrypted Portal</div>
        <div class="status-badge">Status: Awaiting Verification</div>
    </nav>

    <div class="gatekeeper-container">
        <div class="form-box">
            <h1 class="brand" style="font-size: 2.5rem; margin-bottom: 10px;">Aetheria</h1>
            <p style="color: var(--text-dim); font-size: 0.8rem; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 50px;">
                Identity Verification
            </p>

            <form id="applicationForm">
                <input type="text" id="userName" placeholder="LEGAL FULL NAME" required>
                <input type="text" id="userCity" placeholder="CURRENT CITY OR REGION" required>
                <input type="text" id="userProfession" placeholder="PROFESSION / INDUSTRY" required>
                
                <button type="submit" class="btn-premium" style="margin-top: 20px;">
                    Initialize Profile
                </button>
            </form>

            <div class="disclaimer">
                By proceeding, you agree to Aetheria's strict privacy and non-disclosure protocols.
            </div>
        </div>
    </div>

    <script>
        // Intercept the form submission
        document.getElementById('applicationForm').addEventListener('submit', function(e) {
            e.preventDefault(); // Stop page from refreshing
            
            // 1. Capture the data
            const name = document.getElementById('userName').value;
            const city = document.getElementById('userCity').value;
            const profession = document.getElementById('userProfession').value;

            // 2. Save the data to the browser's memory (localStorage)
            localStorage.setItem('aetheria_name', name);
            localStorage.setItem('aetheria_city', city);
            localStorage.setItem('aetheria_profession', profession);

            // 3. Change the button text to look like it's processing
            const btn = document.querySelector('.btn-premium');
            btn.innerText = "Encrypting Identity...";
            btn.style.color = "#000";
            btn.style.backgroundColor = "#d4af37"; // Gold

            // 4. Redirect to the explore page after a short dramatic pause (1.5 seconds)
            setTimeout(() => {
                window.location.href = "explore.html";
            }, 1500);
        });
    </script>

</body>
</html>
